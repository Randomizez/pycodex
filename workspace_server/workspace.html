<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>pycodex workspace</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f2f6f3;
      --panel: #ffffff;
      --ink: #1e2529;
      --muted: #5f6f75;
      --line: #d2ddd5;
      --accent: #0f8f55;
      --accent-ink: #ffffff;
      --warn-soft: #fff5cf;
      --info: #1f6fa4;
      --info-soft: #edf8ff;
      --danger: #b23a3a;
      --danger-soft: #fff1ef;
      --violet: #6b4fb0;
      --violet-soft: #f5f0ff;
      --code: #f3f7f8;
      --entry-shadow: 0 1px 2px rgba(25, 35, 31, 0.04);
      --space-1: 2px;
      --space-2: 4px;
      --space-3: 6px;
      --space-4: 8px;
      --space-5: 10px;
      --space-6: 12px;
      --space-7: 14px;
      --radius-sm: 4px;
      --radius-md: 6px;
      --chat-width: min(42vw, 760px);
      --splitter-width: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--splitter-width) var(--chat-width);
      height: 100dvh;
      min-width: 0;
    }
    .workspace.collapsed .splitter::after {
      background: #4f6f60;
    }
    .board-pane {
      min-width: 0;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: #fff;
    }
    .boardbar {
      min-width: 0;
      border-bottom: 1px solid var(--line);
      padding: var(--space-4) var(--space-6);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .board {
      border: 0;
      min-width: 0;
      width: 100%;
      height: 100%;
      background: #fff;
    }
    .splitter {
      position: relative;
      width: 8px;
      height: 100dvh;
      border: 0;
      border-left: 1px solid #c1cec6;
      border-right: 1px solid #c1cec6;
      background: #dfe8e2;
      cursor: col-resize;
      padding: 0;
      touch-action: none;
    }
    .splitter::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 3px;
      height: 42px;
      border-radius: 999px;
      background: #7d9588;
      transform: translate(-50%, -50%);
    }
    .splitter:hover,
    .workspace.resizing .splitter {
      background: #d3dfd7;
      border-color: #aebeb4;
    }
    .splitter:hover::after,
    .workspace.resizing .splitter::after {
      background: #527465;
    }
    .workspace.resizing,
    .workspace.resizing * {
      cursor: col-resize;
      user-select: none;
    }
    .chat {
      position: relative;
      min-width: 0;
      height: 100dvh;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: var(--panel);
    }
    .topbar {
      min-width: 0;
      padding: var(--space-4) var(--space-7);
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: var(--space-4);
    }
    .tabbar {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      min-width: 0;
    }
    .context-meter {
      --context-remaining: 0%;
      --context-meter-size: 22px;
      position: relative;
      display: inline-grid;
      place-items: center;
      width: var(--context-meter-size);
      height: var(--context-meter-size);
      border-radius: 999px;
      background: conic-gradient(#4ca56f 0 var(--context-remaining), #cfd8d2 0 100%);
      color: #335243;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 9px;
      line-height: 1;
      flex: 0 0 auto;
    }
    .context-meter.hidden {
      display: none;
    }
    .context-meter::before {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 999px;
      background: #fff;
    }
    .context-meter-value {
      position: relative;
      z-index: 1;
    }
    .tabs {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      min-width: 0;
      overflow-x: auto;
      scrollbar-width: thin;
    }
    .tab {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      min-width: 88px;
      max-width: 180px;
      height: 31px;
      border: 1px solid #d5ddd7;
      border-radius: var(--radius-sm);
      background: #f6f8f7;
      color: var(--ink);
      padding: 0 var(--space-3) 0 var(--space-4);
      font: inherit;
      cursor: pointer;
      user-select: none;
    }
    .tab:focus-within,
    .tab-new:focus {
      outline: 2px solid #9bb7a6;
      outline-offset: 1px;
    }
    .tab.active {
      border-color: #afd6bd;
      background: #eef7f1;
      box-shadow: inset 0 -2px 0 var(--accent);
    }
    .tab-status {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 15px;
      height: 15px;
      border: 1px solid transparent;
      border-radius: 999px;
      background: transparent;
      padding: 0;
      flex: 0 0 auto;
    }
    .tab-status::before {
      content: "";
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: var(--accent);
      animation: spinner-pulse 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .tab-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      text-align: left;
    }
    .tab-close,
    .tab-new {
      width: 31px;
      height: 31px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: #eef7f1;
      color: var(--muted);
      padding: 0;
      line-height: 1;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .tab-close {
      width: 18px;
      height: 18px;
      border: 0;
      background: transparent;
      opacity: 0.42;
      font-size: 17px;
      font-weight: 500;
      line-height: 18px;
    }
    .tab-new {
      font-size: 22px;
      font-weight: 400;
      line-height: 31px;
    }
    .tab:hover .tab-close,
    .tab:focus-within .tab-close,
    .tab.active .tab-close {
      opacity: 0.85;
    }
    .tab-close:disabled {
      opacity: 0.22;
      cursor: default;
    }
    .tab-close:hover,
    .tab-new:hover {
      color: var(--ink);
      background: #ffffff;
    }
    .log {
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: var(--space-6) var(--space-7);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      background: #fbfcfa;
    }
    .entry {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: var(--space-4) var(--space-5);
      background: #fff;
      box-shadow: var(--entry-shadow);
    }
    .entry.user {
      border-color: #edd17a;
      background: var(--warn-soft);
      color: #5a4714;
    }
    .entry.response,
    .entry.assistant {
      border-color: #d0ddd5;
      background: #ffffff;
    }
    .entry.thinking {
      border-color: #b9dcc5;
      background: #f0fbf3;
      color: #256b43;
      animation: thinking-breathe 4.8s ease-in-out infinite;
    }
    .entry.control {
      border-color: #b9d8ea;
      background: var(--info-soft);
      color: var(--info);
    }
    .entry.tool {
      border-color: #d7c8f0;
      background: var(--violet-soft);
      color: var(--violet);
      font-size: 12px;
    }
    .entry.error {
      border-color: #efb4ad;
      background: var(--danger-soft);
      color: var(--danger);
    }
    .text {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .markdown {
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .markdown p {
      margin: 0 0 var(--space-4);
    }
    .markdown p:last-child,
    .markdown ul:last-child,
    .markdown ol:last-child,
    .markdown pre:last-child,
    .markdown table:last-child {
      margin-bottom: 0;
    }
    .markdown ul,
    .markdown ol {
      margin: 0 0 var(--space-4) 18px;
      padding: 0;
    }
    .markdown li {
      margin: 2px 0;
    }
    .markdown pre {
      margin: 0 0 var(--space-4);
      padding: var(--space-4) var(--space-5);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--code);
      overflow-x: auto;
      white-space: pre;
    }
    .markdown pre code {
      padding: 0;
      border: 0;
      background: transparent;
      font-size: 12px;
    }
    .markdown table {
      width: 100%;
      margin: 0 0 var(--space-4);
      border-collapse: collapse;
      font-size: 13px;
    }
    .markdown th,
    .markdown td {
      border: 1px solid var(--line);
      padding: var(--space-3) var(--space-4);
      text-align: left;
      vertical-align: top;
    }
    .markdown th {
      background: #eef7f1;
      font-weight: 650;
    }
    .markdown a {
      color: #176fa8;
      text-decoration: none;
    }
    .markdown a:hover {
      text-decoration: underline;
    }
    .composer {
      position: relative;
      min-width: 0;
      padding: var(--space-4);
      display: grid;
      gap: var(--space-3);
      align-content: end;
      background: #fff;
    }
    textarea {
      min-width: 0;
      resize: vertical;
      max-height: 35vh;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: var(--space-4) var(--space-5);
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      line-height: 1.4;
      overflow-y: auto;
    }
    textarea:focus {
      border-color: #65b782;
      box-shadow: 0 0 0 3px rgba(15, 143, 85, 0.13);
      outline: 0;
    }
    .actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }
    .spinner-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-self: start;
      align-self: end;
      max-width: 100%;
    }
    .prompt-row {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      min-width: 0;
    }
    .spinner {
      --spinner-pill-height: 22px;
      position: relative;
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      height: var(--spinner-pill-height);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: var(--space-1) var(--space-4) var(--space-1) 18px;
      border-radius: 999px;
      background: rgba(240, 250, 244, 0.96);
      border: 1px solid rgba(172, 216, 188, 0.9);
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    .spinner:empty {
      display: none;
    }
    .spinner-wrap:not(:has(.spinner:not(:empty))) {
      display: none;
    }
    .spinner:focus-visible {
      border-color: #65b782;
      box-shadow: 0 0 0 3px rgba(15, 143, 85, 0.13);
      outline: 0;
    }
    .spinner-wrap:has(.spinner:not(:empty)) {
      margin-bottom: var(--space-1);
    }
    .spinner:not(:empty)::before {
      content: "";
      position: absolute;
      left: 7px;
      top: 50%;
      width: 6px;
      height: 6px;
      margin-top: -3px;
      border-radius: 999px;
      background: var(--accent);
      animation: spinner-pulse 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .spinner.notify-enabled {
      color: #0b6b43;
      background: #e6f4eb;
      border-color: #4ca56f;
      box-shadow:
        inset 0 1px 2px rgba(9, 93, 55, 0.16),
        inset 0 0 0 1px rgba(15, 143, 85, 0.1);
    }
    .toast {
      position: absolute;
      left: 0;
      bottom: 100%;
      z-index: 5;
      width: max-content;
      max-width: min(320px, calc(100vw - var(--space-6) * 2));
      border: 1px solid #bfd6c8;
      border-radius: var(--radius-sm);
      background: #f6fbf8;
      color: var(--ink);
      box-shadow: 0 8px 20px rgba(25, 35, 31, 0.12);
      padding: var(--space-4) var(--space-6);
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(4px);
      transition: opacity 120ms ease, transform 120ms ease;
      margin-bottom: var(--space-3);
    }
    .toast.visible {
      opacity: 1;
      transform: translateY(0);
    }
    @keyframes spinner-pulse {
      0%, 100% {
        opacity: 0.45;
        transform: scale(0.82);
      }
      50% {
        opacity: 1;
        transform: scale(1.08);
      }
    }
    @keyframes thinking-breathe {
      0%, 100% {
        border-color: #b9dcc5;
        box-shadow: var(--entry-shadow);
      }
      50% {
        border-color: #72d494;
        box-shadow:
          0 0 0 2px rgba(22, 168, 90, 0.16),
          0 2px 7px rgba(25, 35, 31, 0.08);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .entry.thinking,
      .tab-status::before,
      .spinner:not(:empty)::before {
        animation: none;
      }
      .tab-status::before,
      .spinner:not(:empty)::before {
        opacity: 0.8;
        transform: none;
      }
    }
    code {
      background: var(--code);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 1px 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }
    @media (max-width: 900px) {
      body { overflow: auto; height: auto; }
      .workspace { min-width: 0; }
    }
  </style>
</head>
<body>
  <div class="workspace">
    <section class="board-pane" aria-label="workspace board">
      <div class="boardbar">Board: <code>__BOARD_LABEL__</code></div>
      <iframe id="boardFrame" class="board" src="board" title="board"></iframe>
    </section>
    <button id="splitter" class="splitter" type="button" aria-label="Resize chat panel"></button>
    <section class="chat" aria-label="pycodex chat">
      <div class="topbar">
        <div class="tabbar">
          <div id="tabs" class="tabs" role="tablist"></div>
          <button id="newTab" class="tab-new" type="button" title="New session" aria-label="New session">+</button>
        </div>
      </div>
      <div id="log" class="log"></div>
      <form id="composer" class="composer">
        <div class="spinner-wrap">
          <div id="toast" class="toast" role="status" aria-live="polite"></div>
          <button id="spinner" class="spinner" type="button" role="checkbox" aria-checked="false" aria-live="polite"></button>
        </div>
        <div class="prompt-row">
          <div id="contextMeter" class="context-meter hidden" aria-hidden="true">
            <span id="contextMeterValue" class="context-meter-value"></span>
          </div>
          <textarea id="prompt" rows="1" placeholder="Ask pycodex or type /help..."></textarea>
        </div>
      </form>
    </section>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <script>
    const log = document.getElementById("log");
    const spinner = document.getElementById("spinner");
    const toast = document.getElementById("toast");
    const prompt = document.getElementById("prompt");
    const form = document.getElementById("composer");
    const boardFrame = document.getElementById("boardFrame");
    const workspace = document.querySelector(".workspace");
    const splitter = document.getElementById("splitter");
    const tabsEl = document.getElementById("tabs");
    const contextMeter = document.getElementById("contextMeter");
    const contextMeterValue = document.getElementById("contextMeterValue");
    const newTabButton = document.getElementById("newTab");
    let pollTimer = null;
    let boardPollTimer = null;
    let pollInFlight = false;
    let boardPollInFlight = false;
    let lastBoardSignature = "";
    let lastRenderedSignature = "";
    let resizeStart = null;
    let spinnerText = "";
    let toastTimer = null;
    let activeSessionId = "";
    let sessions = [];
    let isComposing = false;
    const sessionState = new Map();
    let restoreScrollTop = null;
    let suppressScrollSave = false;
    const markdownRenderer = window.markdownit
      ? window.markdownit({html: false, linkify: true, breaks: false})
      : null;

    function relativeUrl(path) {
      return new URL(path, window.location.href).toString();
    }

    function addEntry(_role, text, cls, shouldStick = null) {
      const stickToBottom = shouldStick === null ? isNearBottom() : shouldStick;
      const entry = document.createElement("div");
      entry.className = "entry " + (cls || _role);
      const body = document.createElement("div");
      body.className = "text";
      body.textContent = text || "";
      entry.appendChild(body);
      log.appendChild(entry);
      if (stickToBottom) scrollToBottom();
      return body;
    }

    function addMarkdownEntry(role, text, cls, shouldStick = null) {
      const stickToBottom = shouldStick === null ? isNearBottom() : shouldStick;
      const entry = document.createElement("div");
      entry.className = "entry " + (cls || role);
      const body = document.createElement("div");
      body.className = "text markdown";
      renderMarkdownInto(body, text || "");
      entry.appendChild(body);
      log.appendChild(entry);
      if (stickToBottom) scrollToBottom();
      return body;
    }

    function renderMarkdownInto(root, source) {
      if (!markdownRenderer || !window.DOMPurify) {
        root.textContent = source || "";
        return;
      }
      const dirtyHtml = markdownRenderer.render(String(source || ""));
      root.innerHTML = window.DOMPurify.sanitize(dirtyHtml, {
        USE_PROFILES: {html: true},
        ADD_ATTR: ["target", "rel"],
      });
      root.querySelectorAll("a").forEach((anchor) => {
        anchor.target = "_blank";
        anchor.rel = "noopener noreferrer";
      });
    }

    function loadChatWidth() {
      const stored = Number(window.localStorage.getItem("pycodex.workspace.chatWidth") || 0);
      if (stored > 0) setChatWidth(stored);
    }

    function centerSplit() {
      setChatWidth(Math.max(0, (window.innerWidth - 8) / 2));
    }

    function setChatWidth(width) {
      const viewportWidth = window.innerWidth || 0;
      const splitterWidth = 8;
      const gutterWidth = Math.min(24, Math.max(12, Math.round(viewportWidth * 0.06)));
      const availableWidth = Math.max(0, viewportWidth - splitterWidth);
      const maxChatWidth = Math.max(gutterWidth, availableWidth - gutterWidth);
      const collapseWidth = Math.min(
        280,
        Math.max(120, Math.round(viewportWidth * 0.25)),
      );
      let nextWidth = Math.max(gutterWidth, Math.min(maxChatWidth, Math.round(width)));
      let collapsed = false;
      if (nextWidth < collapseWidth) {
        nextWidth = gutterWidth;
        collapsed = true;
      } else if (availableWidth - nextWidth < collapseWidth) {
        nextWidth = maxChatWidth;
        collapsed = true;
      }
      workspace.style.setProperty("--chat-width", `${nextWidth}px`);
      workspace.classList.toggle("collapsed", collapsed);
      window.localStorage.setItem("pycodex.workspace.chatWidth", String(nextWidth));
    }

    function startResize(event) {
      if (!workspace) return;
      const chatWidth = document.querySelector(".chat").getBoundingClientRect().width;
      resizeStart = { pointerId: event.pointerId, startX: event.clientX, startWidth: chatWidth };
      splitter.setPointerCapture(event.pointerId);
      workspace.classList.add("resizing");
      event.preventDefault();
    }

    function updateResize(event) {
      if (!resizeStart) return;
      const delta = resizeStart.startX - event.clientX;
      setChatWidth(resizeStart.startWidth + delta);
      event.preventDefault();
    }

    function endResize(event) {
      if (!resizeStart) return;
      try {
        splitter.releasePointerCapture(resizeStart.pointerId);
      } catch (_error) {
        // Pointer capture can already be released by the browser.
      }
      resizeStart = null;
      workspace.classList.remove("resizing");
      event.preventDefault();
    }

    function setSpinner(text, options = {}) {
      const previousText = spinnerText;
      const nextText = String(text || "").trim();
      const wasRunning = Boolean(previousText);
      const isRunning = Boolean(nextText);
      spinnerText = nextText;
      spinner.textContent = spinnerText;
      if (wasRunning && !isRunning && !options.suppressDoneNotification) {
        const state = stateForSession(activeSessionId);
        if (state.wasRunning) notifySessionDone(activeSessionId);
      }
      updateSpinnerNotifyUi();
    }

    function showToast(text) {
      if (toastTimer) clearTimeout(toastTimer);
      toast.textContent = text;
      toast.classList.add("visible");
      toastTimer = setTimeout(() => {
        toastTimer = null;
        toast.classList.remove("visible");
      }, 1400);
    }

    function updateSpinnerNotifyUi() {
      const state = stateForSession(activeSessionId);
      const enabled = Boolean(spinnerText && state.notifyWhenDone);
      spinner.classList.toggle("notify-enabled", enabled);
      spinner.setAttribute("aria-checked", enabled ? "true" : "false");
      if (!spinnerText) {
        spinner.title = "Spinner is idle";
      } else if (enabled) {
        spinner.title = "Notify when done is on";
      } else {
        spinner.title = "Notify when done is off";
      }
    }

    function notificationAvailable() {
      return "Notification" in window;
    }

    function requestNotificationPermission() {
      try {
        const requestResult = Notification.requestPermission();
        if (requestResult && typeof requestResult.then === "function") {
          return requestResult;
        }
        return Promise.resolve(Notification.permission);
      } catch (_error) {
        return Promise.resolve(Notification.permission);
      }
    }

    function notifySessionDone(sessionId, sessionSummary = null) {
      if (!sessionId) return;
      const state = stateForSession(sessionId);
      if (!state.notifyWhenDone) return;
      state.notifyWhenDone = false;
      if (!notificationAvailable() || Notification.permission !== "granted") return;
      const session = sessionSummary || sessionById(sessionId);
      const title = (session && session.title) || "pycodex";
      const lastAssistant = (session && session.last_assistant) || "Done.";
      try {
        new Notification(`session: ${title}`, {
          body: lastAssistant,
          tag: `pycodex-workspace-done-${sessionId}`,
        });
      } catch (_error) {
        return;
      }
    }

    function sessionById(sessionId) {
      return sessions.find((session) => (session.id || "") === sessionId) || null;
    }

    function isSessionRunning(sessionId) {
      if (sessionId === activeSessionId && spinnerText) return true;
      const session = sessionById(sessionId);
      if (session) return Boolean(session.running);
      return false;
    }

    async function toggleSpinnerNotification() {
      const sessionId = activeSessionId;
      if (!sessionId || !isSessionRunning(sessionId)) {
        showToast("notify-on-done unavailable");
        return;
      }
      const state = stateForSession(sessionId);
      if (state.notifyWhenDone) {
        state.notifyWhenDone = false;
        showToast("notify-on-done canceled");
        updateSpinnerNotifyUi();
        return;
      }
      if (!notificationAvailable()) {
        showToast("browser notifications unavailable");
        return;
      }
      if (Notification.permission === "denied") {
        showToast("browser notifications blocked");
        return;
      }
      state.notifyWhenDone = true;
      showToast("notify-on-done enabled");
      updateSpinnerNotifyUi();
      if (Notification.permission !== "granted") {
        const permission = await requestNotificationPermission();
        if (permission !== "granted") {
          state.notifyWhenDone = false;
          showToast("notify-on-done canceled");
          updateSpinnerNotifyUi();
          return;
        }
      }
      if (!isSessionRunning(sessionId)) {
        state.notifyWhenDone = false;
        showToast("notify-on-done canceled");
      }
      updateSpinnerNotifyUi();
    }

    function isNearBottom() {
      return log.scrollHeight - log.scrollTop - log.clientHeight < 80;
    }

    function scrollToBottom() {
      log.scrollTop = log.scrollHeight;
    }

    function resizePrompt() {
      prompt.style.height = "auto";
      const borderHeight = prompt.offsetHeight - prompt.clientHeight;
      const maxHeight = Math.round(window.innerHeight * 0.35);
      const nextHeight = Math.min(prompt.scrollHeight + borderHeight, maxHeight);
      prompt.style.height = `${nextHeight}px`;
    }

    function stateForSession(sessionId) {
      const key = String(sessionId || "");
      if (!sessionState.has(key)) {
        sessionState.set(key, {
          lastRenderedSignature: "",
          scrollTop: null,
          draft: "",
          notifyWhenDone: false,
          wasRunning: false,
        });
      }
      return sessionState.get(key);
    }

    function saveActiveSessionUiState() {
      if (!activeSessionId) return;
      const state = stateForSession(activeSessionId);
      if (log.scrollHeight > log.clientHeight) {
        state.scrollTop = log.scrollTop;
      }
      state.draft = prompt.value;
      state.lastRenderedSignature = lastRenderedSignature;
    }

    function updateSessions(nextSessions) {
      const incomingSessions = Array.isArray(nextSessions) ? nextSessions : sessions;
      incomingSessions.forEach((session) => {
        const sessionId = session.id || "";
        if (!sessionId) return;
        const state = stateForSession(sessionId);
        const wasRunning = Boolean(state.wasRunning);
        const isRunning = Boolean(session.running);
        if (!wasRunning && isRunning) {
          state.notifyWhenDone = false;
        } else if (wasRunning && !isRunning) {
          notifySessionDone(sessionId, session);
        }
        state.wasRunning = isRunning;
      });
      sessions = incomingSessions;
      if (!activeSessionId && sessions.length) {
        activeSessionId = sessions[0].id || "";
      }
      renderTabs();
      updateContextMeter();
      updateSpinnerNotifyUi();
    }

    function renderTabs() {
      tabsEl.textContent = "";
      sessions.forEach((session, index) => {
        const sessionId = session.id || "";
        const tab = document.createElement("div");
        tab.className =
          "tab" +
          (sessionId === activeSessionId ? " active" : "") +
          (session.running ? " running" : "");
        tab.title = session.title || `Session ${index + 1}`;
        tab.setAttribute("role", "tab");
        tab.setAttribute("aria-selected", sessionId === activeSessionId ? "true" : "false");
        if (session.running) tab.setAttribute("aria-busy", "true");
        tab.addEventListener("click", () => switchSession(sessionId));

        if (session.running) {
          const status = document.createElement("span");
          status.className = "tab-status";
          status.setAttribute("aria-hidden", "true");
          tab.appendChild(status);
        }

        const label = document.createElement("span");
        label.className = "tab-label";
        label.textContent = session.title || `Session ${index + 1}`;
        tab.appendChild(label);

        const close = document.createElement("button");
        close.type = "button";
        close.className = "tab-close";
        close.title = "Close session";
        close.setAttribute("aria-label", "Close session");
        close.textContent = "×";
        close.disabled = sessions.length <= 1;
        close.addEventListener("click", (event) => {
          event.stopPropagation();
          closeSession(sessionId);
        });
        tab.appendChild(close);
        tabsEl.appendChild(tab);
      });
    }

    function updateContextMeter(snapshot = null) {
      let percent = null;
      if (snapshot && snapshot.context_remaining_percent !== undefined) {
        percent = snapshot.context_remaining_percent;
      } else {
        const session = sessionById(activeSessionId);
        if (session && session.context_remaining_percent !== undefined) {
          percent = session.context_remaining_percent;
        }
      }
      if (percent === null || percent === undefined || percent === "") {
        contextMeter.classList.add("hidden");
        contextMeterValue.textContent = "";
        return;
      }
      const value = Math.max(0, Math.min(100, Math.round(Number(percent))));
      if (!Number.isFinite(value)) {
        contextMeter.classList.add("hidden");
        contextMeterValue.textContent = "";
        return;
      }
      if (value >= 100) {
        contextMeter.classList.remove("hidden");
        contextMeter.style.setProperty("--context-remaining", `${value}%`);
        contextMeterValue.textContent = "";
        return;
      }
      contextMeter.classList.remove("hidden");
      contextMeter.style.setProperty("--context-remaining", `${value}%`);
      contextMeterValue.textContent = String(value);
    }

    function messageSignature(snapshot) {
      const turns = (snapshot && snapshot.turns) || [];
      return JSON.stringify(
        turns.map((item) => [
          item.submission_id || "",
          item.turn_id || "",
          item.prompt || "",
          item.response || "",
          item.thinking || "",
          item.status || "",
          item.error || "",
          item.kind || "",
        ]),
      );
    }

    async function pollSession() {
      if (pollInFlight) return;
      pollInFlight = true;
      const requestedSessionId = activeSessionId;
      try {
        const path = requestedSessionId
          ? `api/session?session_id=${encodeURIComponent(requestedSessionId)}`
          : "api/session";
        const response = await fetch(relativeUrl(path));
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        if (requestedSessionId && requestedSessionId !== activeSessionId) {
          return;
        }
        if (payload.session_id && payload.session_id !== activeSessionId) {
          activeSessionId = payload.session_id;
        }
        updateSessions(payload.sessions || []);
        renderSnapshot(payload.snapshot);
      } catch (error) {
        setSpinner(`poll error: ${error.message}`);
      } finally {
        pollInFlight = false;
      }
    }

    function startPolling() {
      if (pollTimer) return;
      pollSession();
      pollTimer = setInterval(pollSession, 2000);
    }

    function stopPolling() {
      if (!pollTimer) return;
      clearInterval(pollTimer);
      pollTimer = null;
    }

    async function pollBoard() {
      if (boardPollInFlight) return;
      boardPollInFlight = true;
      try {
        const response = await fetch(relativeUrl("api/board"));
        if (!response.ok) return;
        const payload = await response.json();
        if (!payload.exists) return;
        const signature = `${payload.mtime_ns || ""}:${payload.size || ""}`;
        if (!lastBoardSignature) {
          lastBoardSignature = signature;
          return;
        }
        if (signature !== lastBoardSignature) {
          lastBoardSignature = signature;
          boardFrame.src = `board?t=${Date.now()}`;
        }
      } catch (_error) {
        return;
      } finally {
        boardPollInFlight = false;
      }
    }

    function startBoardPolling() {
      if (boardPollTimer) return;
      pollBoard();
      boardPollTimer = setInterval(pollBoard, 2000);
    }

    function renderSnapshot(snapshot) {
      if (!snapshot) return;
      const state = stateForSession(activeSessionId);
      const signature = messageSignature(snapshot);
      if (signature === state.lastRenderedSignature) {
        setSpinner(snapshot.spinner || "");
        updateContextMeter(snapshot);
        return;
      }
      state.lastRenderedSignature = signature;
      lastRenderedSignature = signature;
      const shouldStick = isNearBottom();
      const previousScrollTop = log.scrollTop;
      suppressScrollSave = true;
      try {
        log.textContent = "";
        const turns = Array.isArray(snapshot.turns) ? snapshot.turns : [];
        if (turns.length) {
          turns.forEach((turn) => renderTurn(turn, shouldStick));
        }
        setSpinner(snapshot.spinner || "");
        updateContextMeter(snapshot);
        if (restoreScrollTop !== null) {
          log.scrollTop = Math.min(
            restoreScrollTop,
            Math.max(0, log.scrollHeight - log.clientHeight),
          );
          restoreScrollTop = null;
        } else if (shouldStick) {
          scrollToBottom();
        } else {
          log.scrollTop = Math.min(
            previousScrollTop,
            Math.max(0, log.scrollHeight - log.clientHeight),
          );
        }
      } finally {
        suppressScrollSave = false;
      }
      state.scrollTop = log.scrollTop;
    }

    function renderTurn(turn, shouldStick) {
      const isControl = turn.kind === "control";
      if (turn.prompt) {
        addEntry(
          isControl ? "command" : "prompt",
          turn.prompt || "",
          isControl ? "control" : "user",
          shouldStick,
        );
      }
      if (turn.response) {
        addMarkdownEntry(
          isControl ? "result" : "response",
          turn.response || "",
          isControl ? "control" : "response",
          shouldStick,
        );
      }
      if (turn.thinking) addEntry("thinking", turn.thinking || "", "thinking", shouldStick);
      if (turn.error) addEntry("error", turn.error || "", "error", shouldStick);
    }

    async function submitPrompt(text) {
      const response = await fetch(relativeUrl("api/session/message"), {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({prompt: text, sender: "web", session_id: activeSessionId}),
      });
      const payload = await response.json();
      if (!response.ok || !payload.ok) {
        addEntry("error", payload.error || `HTTP ${response.status}`, "error");
        setSpinner("");
        return;
      }
      if (payload.snapshot) {
        if (payload.sessions) updateSessions(payload.sessions);
        renderSnapshot(payload.snapshot);
      } else {
        setSpinner("");
      }
      startPolling();
    }

    async function switchSession(sessionId) {
      if (!sessionId || sessionId === activeSessionId) return;
      saveActiveSessionUiState();
      activeSessionId = sessionId;
      const state = stateForSession(sessionId);
      state.lastRenderedSignature = "";
      lastRenderedSignature = "";
      prompt.value = state.draft || "";
      resizePrompt();
      suppressScrollSave = true;
      log.textContent = "";
      suppressScrollSave = false;
      setSpinner("", {suppressDoneNotification: true});
      restoreScrollTop = state.scrollTop;
      await pollSession();
      renderTabs();
    }

    async function createSession() {
      saveActiveSessionUiState();
      const response = await fetch(relativeUrl("api/sessions"), {method: "POST"});
      const payload = await response.json();
      if (!response.ok || !payload.ok) {
        addEntry("error", payload.error || `HTTP ${response.status}`, "error");
        return;
      }
      activeSessionId = payload.session_id || "";
      const state = stateForSession(activeSessionId);
      state.draft = "";
      state.scrollTop = null;
      state.lastRenderedSignature = "";
      lastRenderedSignature = "";
      prompt.value = "";
      resizePrompt();
      restoreScrollTop = null;
      updateSessions(payload.sessions || []);
      renderSnapshot(payload.snapshot);
    }

    async function closeSession(sessionId) {
      if (!sessionId || sessions.length <= 1) return;
      const response = await fetch(relativeUrl(`api/sessions/${encodeURIComponent(sessionId)}`), {
        method: "DELETE",
      });
      const payload = await response.json();
      if (!response.ok || !payload.ok) {
        addEntry("error", payload.error || `HTTP ${response.status}`, "error");
        return;
      }
      sessionState.delete(sessionId);
      updateSessions(payload.sessions || []);
      if (activeSessionId === sessionId) {
        activeSessionId = sessions.length ? sessions[0].id || "" : "";
        lastRenderedSignature = "";
        prompt.value = "";
        resizePrompt();
        suppressScrollSave = true;
        log.textContent = "";
        suppressScrollSave = false;
        await pollSession();
      } else {
        renderTabs();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const text = prompt.value.trim();
      if (!text) return;
      prompt.value = "";
      resizePrompt();
      stateForSession(activeSessionId).draft = "";
      submitPrompt(text);
    });

    prompt.addEventListener("input", () => {
      stateForSession(activeSessionId).draft = prompt.value;
      resizePrompt();
    });

    prompt.addEventListener("compositionstart", () => {
      isComposing = true;
    });

    prompt.addEventListener("compositionend", () => {
      isComposing = false;
    });

    log.addEventListener("scroll", () => {
      if (suppressScrollSave) return;
      if (!activeSessionId) return;
      stateForSession(activeSessionId).scrollTop = log.scrollTop;
    });

    prompt.addEventListener("keydown", (event) => {
      if (event.isComposing || isComposing || event.keyCode === 229) return;
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
      }
    });

    splitter.addEventListener("pointerdown", startResize);
    splitter.addEventListener("pointermove", updateResize);
    splitter.addEventListener("pointerup", endResize);
    splitter.addEventListener("pointercancel", endResize);
    splitter.addEventListener("dblclick", centerSplit);
    spinner.addEventListener("click", toggleSpinnerNotification);
    newTabButton.addEventListener("click", createSession);
    window.addEventListener("resize", () => {
      const current = Number(window.localStorage.getItem("pycodex.workspace.chatWidth") || 0);
      if (current > 0) setChatWidth(current);
      resizePrompt();
    });
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState !== "visible") return;
      pollSession();
      pollBoard();
    });

    loadChatWidth();
    resizePrompt();
    startPolling();
    startBoardPolling();
  </script>
</body>
</html>
